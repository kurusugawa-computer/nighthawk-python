# Nighthawk Natural Block System Prompt A/B Testing
#
# Run:
#   cd evals/promptfoo
#   PROMPTFOO_PYTHON="$(uv python find)" OPENAI_API_KEY="$OPENAI_API_KEY" \
#     npx promptfoo@latest eval -c promptfooconfig-prompt-ab.yaml
#
# View results:
#   npx promptfoo@latest view

description: "Nighthawk prompt A/B testing: gpt-5.4-mini only"

prompts:
  - "{{natural_program}}"

providers:
  # --- Control: eval_default + eval_examples (winner from prior eval) ---
  - id: file://provider.py
    label: "control: eval_default + examples"
    config:
      model: "openai-responses:gpt-5.4-mini"
      system_prompt_file: prompts/eval_default.txt
      tool_preset: "eval_examples"

  # --- Variant A: eval_sequenced + eval_examples ---
  - id: file://provider.py
    label: "eval_sequenced + examples"
    config:
      model: "openai-responses:gpt-5.4-mini"
      system_prompt_file: prompts/eval_sequenced.txt
      tool_preset: "eval_examples"

  # --- Variant B: eval_mutation_aware + eval_examples ---
  - id: file://provider.py
    label: "eval_mutation_aware + examples"
    config:
      model: "openai-responses:gpt-5.4-mini"
      system_prompt_file: prompts/eval_mutation_aware.txt
      tool_preset: "eval_examples"

  # --- Variant C: eval_default + eval_mutation_hint ---
  - id: file://provider.py
    label: "eval_default + mutation_hint"
    config:
      model: "openai-responses:gpt-5.4-mini"
      system_prompt_file: prompts/eval_default.txt
      tool_preset: "eval_mutation_hint"


defaultTest:
  assert:
    - type: is-json
    - type: python
      value: file://assertions/outcome_kind.py

tests:
  - file://test_cases/binding_operations.yaml
  - file://test_cases/outcome_kinds.yaml
  - file://test_cases/tool_selection.yaml
  - file://test_cases/edge_cases.yaml
  - file://test_cases/loop_outcomes.yaml
  - file://test_cases/multi_step.yaml
  - file://test_cases/null_handling.yaml
