# Nighthawk Natural Block System Prompt Evaluation — Regression
#
# Run:
#   cd evals/promptfoo
#   PROMPTFOO_PYTHON="$(uv python find)" OPENAI_API_KEY="$OPENAI_API_KEY" \
#     npx promptfoo@latest eval
#
# View results:
#   npx promptfoo@latest view

description: "Nighthawk regression: winner combo + all providers"

# The prompt field is required by promptfoo but not used by the provider.
# The provider constructs the actual LLM prompt internally.
prompts:
  - "{{natural_program}}"

providers:
  # --- Winner: openai-responses + eval_default + eval_examples ---
  - id: file://provider.py
    label: "gpt-5.4-mini + eval_default + examples"
    config:
      model: "openai-responses:gpt-5.4-mini"
      system_prompt_file: prompts/eval_default.txt
      tool_preset: "eval_examples"

  # --- Coding agent: claude-code-cli ---
  - id: file://provider.py
    label: "claude-code-cli:haiku + coding_agent + examples"
    config:
      model: "claude-code-cli:haiku"
      system_prompt_file: prompts/eval_coding_agent.txt
      tool_preset: "eval_examples"

  # --- Coding agent: codex ---
  - id: file://provider.py
    label: "codex:gpt-5.4-mini + coding_agent + examples"
    config:
      model: "codex:gpt-5.4-mini"
      system_prompt_file: prompts/eval_coding_agent.txt
      tool_preset: "eval_examples"


defaultTest:
  assert:
    # Every test must produce valid JSON with a valid outcome kind
    - type: is-json
    - type: python
      value: file://assertions/outcome_kind.py

tests:
  - file://test_cases/binding_operations.yaml
  - file://test_cases/outcome_kinds.yaml
  - file://test_cases/tool_selection.yaml
  - file://test_cases/edge_cases.yaml
  - file://test_cases/loop_outcomes.yaml
  - file://test_cases/multi_step.yaml
  - file://test_cases/null_handling.yaml
