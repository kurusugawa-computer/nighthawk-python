# P-BIND-030: Free-form context extraction and arithmetic
- description: "P-BIND-030: Extract value from free-form context text and compute"
  vars:
    natural_program: |
      Prior context: Step 0 produced result=42.
      Add 1 to the previous result mentioned in the context and set <:result>.
    input_bindings: '{}'
    output_binding_names: '["result"]'
  assert:
    - type: python
      value: file://assertions/outcome_kind.py
      config:
        expected_outcome_kind: "pass"
    - type: python
      value: file://assertions/binding_value.py
      config:
        expected_bindings:
          result: 43
