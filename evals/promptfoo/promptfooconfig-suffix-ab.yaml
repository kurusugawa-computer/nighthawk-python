# Nighthawk StepFinalResult Suffix Fragment A/B Testing
#
# Tests different suffix fragment text variants that guide LLM outcome selection.
# All variants use the same base system prompt and tool preset to isolate the
# effect of the suffix fragment.
#
# Run:
#   cd evals/promptfoo
#   set -a; source ../../.env; set +a
#   PROMPTFOO_PYTHON="$(uv python find)" npx promptfoo@latest eval \
#     -c promptfooconfig-suffix-ab.yaml --no-cache
#
# View results:
#   npx promptfoo@latest view

description: "Nighthawk suffix fragment A/B testing: gpt-5.4-mini only"

prompts:
  - "{{natural_program}}"

providers:
  # --- Legacy control: previous production suffix text ---
  - id: file://provider.py
    label: "legacy suffix"
    config:
      model: "openai-responses:gpt-5.4-mini"
      system_prompt_file: prompts/eval_default.txt
      tool_preset: "eval_examples"
      suffix_variant: "legacy"

  # --- Current production suffix text ---
  - id: file://provider.py
    label: "production suffix"
    config:
      model: "openai-responses:gpt-5.4-mini"
      system_prompt_file: prompts/eval_default.txt
      tool_preset: "eval_examples"
      suffix_variant: "control"

  # --- Variant B: Examples (one JSON example per allowed kind) ---
  - id: file://provider.py
    label: "suffix: examples"
    config:
      model: "openai-responses:gpt-5.4-mini"
      system_prompt_file: prompts/eval_default.txt
      tool_preset: "eval_examples"
      suffix_variant: "examples"


defaultTest:
  assert:
    - type: is-json
    - type: python
      value: file://assertions/outcome_kind.py

tests:
  - file://test_cases/binding_operations.yaml
  - file://test_cases/outcome_kinds.yaml
  - file://test_cases/tool_selection.yaml
  - file://test_cases/edge_cases.yaml
  - file://test_cases/loop_outcomes.yaml
  - file://test_cases/multi_step.yaml
  - file://test_cases/null_handling.yaml
