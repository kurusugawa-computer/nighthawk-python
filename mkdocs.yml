site_name: Nighthawk
site_description: Compact reimplementation of nightjarpy-like Natural blocks in Python.
site_url: https://kurusugawa-computer.github.io/nighthawk-python/
repo_url: https://github.com/kurusugawa-computer/nighthawk-python
repo_name: kurusugawa-computer/nighthawk-python

theme:
  name: material
  logo: assets/nighthawk_logo-128x128.png
  favicon: assets/nighthawk_logo-128x128.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.instant
    - navigation.sections

exclude_docs: |
  claude/
  logfire/
  nightjarpy/

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Manual: manual.md
  - Design: design.md
  - Roadmap: roadmap.md

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - toc:
      permalink: true
